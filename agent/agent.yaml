spec_version: "0.1.0"
name: regret-minimizer
version: 1.0.0
description: Mines git history and past decisions to help you avoid repeating mistakes

model:
  preferred: "anthropic:claude-sonnet-4-5-20250929"
  fallback: ["openai:gpt-4o"]
  constraints:
    temperature: 0.2
    max_tokens: 512

tools: [read, write, memory]

runtime:
  max_turns: 5
  timeout: 60
